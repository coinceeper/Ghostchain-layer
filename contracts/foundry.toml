# ───── Production Profile ─────
# Maximum optimization for mainnet deployment
# Use: FOUNDRY_PROFILE=production forge build
[profile.production]
src = "src"
out = "out-production"
libs = ["lib"]
solc = "0.8.24"
evm_version = "cancun"
via_ir = true
optimizer = true
optimizer_runs = 1000000
gas_limit = 30000000
bytecode_hash = "none"
# Enable metadata hash stripping to reduce bytecode size
# and avoid source code uniqueness issues on Etherscan

# See https://book.getfoundry.sh/config/ for more config options
