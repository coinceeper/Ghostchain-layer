# GhostChain Protocol - Prometheus Configuration
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'ghostchain'

scrape_configs:
  - job_name: 'ghostchain-solver'
    scrape_interval: 15s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['solver:9090']
        labels:
          service: 'solver'
          environment: 'production'

  - job_name: 'ghostchain-zk-prover'
    scrape_interval: 30s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['zk-prover:8080']
        labels:
          service: 'zk-prover'
          environment: 'production'

  - job_name: 'node-exporter'
    scrape_interval: 60s
    static_configs:
      - targets: ['node-exporter:9100']
