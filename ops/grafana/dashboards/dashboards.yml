# GhostChain Protocol - Grafana Dashboard Provisioning
apiVersion: 1

providers:
  - name: 'GhostChain Dashboards'
    orgId: 1
    folder: 'GhostChain'
    folderUid: ''
    type: file
    disableDeletion: true
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: true
