name: GhostChain CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FOUNDRY_PROFILE: ci
  NODE_VERSION: '20'

jobs:
  # ───── Smart Contract Checks ─────
  contracts:
    name: Smart Contracts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./contracts

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install dependencies
        run: forge install

      - name: Check formatting
        run: forge fmt --check

      - name: Build
        run: forge build

      - name: Run tests
        run: forge test -vvv

      - name: Run gas report
        run: forge test --gas-report

      - name: Slither static analysis
        uses: crytic/slither-action@v0.4.0
        continue-on-error: true
        with:
          target: contracts/
          slither-config: contracts/slither.config.json

  # ───── SDK Checks ─────
  sdk:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./sdk

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: sdk/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Type check
        run: npx tsc --noEmit

  # ───── Relayer Checks ─────
  relayer:
    name: Solver/Relayer
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./relayer

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: relayer/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Build SDK dependency
        run: npm run build
        working-directory: ./sdk

      - name: Integration tests
        run: npx vitest run test/integration.test.ts

  # ───── ZK Circuits ─────
  zk:
    name: ZK Circuits
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./zk

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: zk/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Circom
        run: |
          wget -qO circom.tar.gz https://github.com/iden3/circom/releases/download/v2.1.6/circom-linux-amd64.tar.gz
          tar -xzf circom.tar.gz
          sudo mv circom /usr/local/bin/
          circom --version

      - name: Install snarkjs
        run: npm install snarkjs

      - name: Download Powers of Tau
        run: |
          mkdir -p ptau
          curl -L https://hermez.s3.amazonaws.com/powersOfTau28_hez_final_16.ptau -o ptau/powersOfTau28_hez_final_16.ptau

      - name: Compile ghostTransfer circuit
        run: circom circuits/ghostTransfer.circom --r1cs --wasm --sym -o build

      - name: Compile ghostTransferNullifier circuit
        run: circom circuits/ghostTransferNullifier.circom --r1cs --wasm --sym -o build

      - name: Setup Groth16 proving key
        run: npx snarkjs groth16 setup build/ghostTransfer.r1cs ptau/powersOfTau28_hez_final_16.ptau build/circuit.zkey

      - name: Contribute to the ceremony
        run: npx snarkjs zkey contribute build/circuit.zkey build/circuit_final.zkey --name='CI contribution' -v

      - name: Export Solidity verifier
        run: npx snarkjs zkey export solidityverifier build/circuit_final.zkey ../../contracts/src/ZKVerifierFull.sol

      - name: Export verification key
        run: npx snarkjs zkey export verificationkey build/circuit_final.zkey build/verification_key.json

      - name: Test proof generation
        run: npm test

  # ───── Docker Build Check ─────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Solver Docker image
        run: docker build -t ghostchain-solver -f relayer/Dockerfile relayer/

      - name: Build ZK Prover Docker image
        run: docker build -t ghostchain-zk-prover -f zk/Dockerfile zk/

  # ───── Security Audit (Production) ─────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Build contracts
        run: |
          cd contracts
          forge build

      - name: Check for production-deployed bootstrap mode
        run: |
          # Ensure ZKVerifier has productionMode variable in the bytecode
          cd contracts
          if grep -q "productionMode" out/ZKVerifier.sol/ZKVerifier.json; then
            echo "✓ Production mode guard detected in ZKVerifier"
          else
            echo "⚠️  WARNING: productionMode not found in ZKVerifier bytecode"
          fi

      - name: Dependency vulnerability scan
        run: |
          # Scan npm dependencies for known vulnerabilities
          npm audit --audit-level=high || echo "Vulnerabilities found — review needed"
          cd sdk && npm audit --audit-level=high || true
          cd ../relayer && npm audit --audit-level=high || true
